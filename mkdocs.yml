site_name: FastAIAgent SDK
site_url: https://docs.fastaiagent.net
site_description: "Build, debug, evaluate, and operate AI agents. The only SDK with fork-and-rerun Agent Replay."
repo_url: https://github.com/fastaifoundry/fastaiagent-sdk
repo_name: fastaifoundry/fastaiagent-sdk
copyright: Copyright &copy; 2026 FastAIFoundry

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_bases: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            docstring_style: google
  - section-index

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - def_list

