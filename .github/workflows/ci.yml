name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v -m "not e2e" --tb=short --cov=fastaiagent --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v4

  # Build the Local UI + wheel from source and confirm the UI bundle is in the
  # wheel. The UI ships inside the wheel (force-include of fastaiagent/ui/static)
  # but is gitignored and built from ui-frontend/ (Vite outputs to ui/static),
  # and the sdist excludes it — so the wheel must be built from source *after*
  # the frontend build. This reproduces the release packaging on every PR so a
  # UI-less wheel can't slip through to ``git tag`` / publish time.
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui-frontend/package-lock.json
      - name: Build Local UI (Vite → fastaiagent/ui/static)
        working-directory: ui-frontend
        run: |
          npm ci
          npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build wheel from source
        run: python -m build --wheel
      - name: Verify wheel bundles the Local UI
        run: |
          n=$(python -c "import glob, zipfile; w=glob.glob('dist/*.whl')[0]; print(sum(1 for f in zipfile.ZipFile(w).namelist() if f.startswith('fastaiagent/ui/static/assets/')))")
          echo "ui/static/assets files in wheel: $n"
          if [ "$n" -lt 50 ]; then echo "::error::wheel is missing the Local UI bundle (fastaiagent/ui/static) — was the frontend built first?"; exit 1; fi

  optional-deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: ["", "openai", "anthropic", "kb", "ui", "ui,kb", "postgres", "all"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv resolves the heavy ``[all]`` graph that pip's backtracker can't
      # (``resolution-too-deep``): pydantic-ai 1.105+ pulls newer transitive
      # deps that pip can't reconcile with crewai/langchain/chroma in finite
      # backtracking. uv finds the valid set in <1s.
      - name: Install uv
        run: pip install uv
      - name: Install with extras
        run: |
          if [ -z "${{ matrix.extras }}" ]; then
            uv pip install --system -e ".[dev]"
          else
            uv pip install --system -e ".[${{ matrix.extras }},dev]"
          fi
      - name: Run tests
        run: pytest tests/ -v -m "not e2e" --tb=short

  e2e-quality-gate:
    runs-on: ubuntu-latest
    needs: test
    services:
      # Postgres backend for the durability integration tests
      # (tests/integration/test_postgres_*). Tests skip cleanly when
      # PG_TEST_DSN is unset, so local runs without Docker still work.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fastaiagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_REQUIRED: "1"
      # Skip platform-push/verify steps on CI — you exercise those locally
      # against the docker-compose platform. Unset this flag locally to run
      # the full 16-step gate.
      E2E_SKIP_PLATFORM: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PG_TEST_DSN: postgresql://postgres:test@localhost:5432/fastaiagent_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv resolves the full ``[all,dev]`` graph (pip hits resolution-too-deep);
      # see the optional-deps job note.
      - name: Install uv
        run: pip install uv
      - name: Install with all extras
        run: uv pip install --system -e ".[all,dev]"
      - name: Run end-to-end quality gate
        run: pytest tests/e2e/ -v -m e2e --tb=short
      - name: Run Postgres durability integration tests
        run: pytest tests/integration/test_postgres_checkpointer.py tests/integration/test_postgres_concurrent_resume.py -v --tb=short
      - name: Regression-from-trace template smoke (no LLM)
        # Always-on guard against template drift — runs in ~30ms.
        # cd'ing isolates pytest's rootdir from the repo's top-level
        # tests/ (the module names ``test_template_smoke`` and ``test_*``
        # collide if both trees are collected together).
        working-directory: examples/regression-from-trace
        run: pytest tests/ -v --tb=short
      - name: Regression-from-trace template — full loop (real LLM)
        # Runs capture → fix → save_test → verify against real OpenAI to
        # catch regressions of any failure mode captured in the dataset.
        # Skipped when OPENAI_API_KEY isn't set (forked PRs from external
        # contributors); kept hard-required for internal PRs via E2E_REQUIRED.
        if: env.OPENAI_API_KEY != ''
        working-directory: examples/regression-from-trace
        run: |
          python capture.py
          python fix.py
          python save_test.py
          python verify.py
