name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v -m "not e2e" --tb=short --cov=fastaiagent --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v4

  optional-deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: ["", "openai", "anthropic", "kb", "ui", "ui,kb", "all"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with extras
        run: |
          if [ -z "${{ matrix.extras }}" ]; then
            pip install -e ".[dev]"
          else
            pip install -e ".[${{ matrix.extras }},dev]"
          fi
      - name: Run tests
        run: pytest tests/ -v -m "not e2e" --tb=short

  e2e-quality-gate:
    runs-on: ubuntu-latest
    needs: test
    env:
      E2E_REQUIRED: "1"
      # Skip platform-push/verify steps on CI — you exercise those locally
      # against the docker-compose platform. Unset this flag locally to run
      # the full 16-step gate.
      E2E_SKIP_PLATFORM: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with all extras
        run: pip install -e ".[all,dev]"
      - name: Run end-to-end quality gate
        run: pytest tests/e2e/ -v -m e2e --tb=short
