name: Bug Report
description: Report a bug in the FastAIAgent SDK
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: SDK Version
      description: Output of `pip show fastaiagent | grep Version`
      placeholder: "0.1.0a1"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the SDK is affected?
      options:
        - Agent
        - Chain
        - Tool (Function/REST/MCP)
        - LLM Client
        - Guardrail
        - Tracing
        - Agent Replay
        - Prompts
        - Knowledge Base
        - Evaluation
        - CLI
        - Platform Sync
        - Integration (OpenAI/Anthropic/LangChain/CrewAI)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages/tracebacks)
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (logs, screenshots, etc.)
